# GitHub Pages deployment for Laurentia Precambrian Poles JupyterBook
#
# INSTRUCTIONS:
# 1. Go to repo Settings > Pages > set Source to "GitHub Actions"
# 2. Push to main branch to trigger deployment
#
# Uses mystmd (JupyterBook v2) to build the site.

name: Deploy JupyterBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Build the book
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          jupyter book build --html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
